<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg-primary: #faf7f2;
        --bg-secondary: #f2ece4;
        --text-primary: #2d2b2a;
        --text-secondary: #66615e;
        --accent-primary: #d97706;
        --accent-primary-hover: #b45309;
        --accent-secondary: #15803d;
        --accent-tertiary: #be123c;
        --border-color: #dcd7cd;
        --font-family: 'Outfit', -apple-system, system-ui, sans-serif;
      }

      body {
        width: 340px;
        margin: 0;
        padding: 16px;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-family);
        font-size: 14px;
        line-height: 1.5;
      }

      h3,
      h4 {
        margin-top: 0;
        font-family: Georgia, serif;
        color: var(--text-primary);
      }

      h3 {
        font-size: 18px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 8px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }

      label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: white;
        color: var(--text-primary);
        font-family: var(--font-family);
        font-size: 13px;
        box-sizing: border-box;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
      }

      .btn {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid transparent;
        font-family: var(--font-family);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.2s;
      }
      .btn-primary {
        background-color: var(--accent-primary);
        color: white;
      }
      .btn-primary:hover {
        background-color: var(--accent-primary-hover);
      }
      .btn-secondary {
        background-color: var(--bg-secondary);
        border-color: var(--border-color);
        color: var(--text-secondary);
      }
      .btn-secondary:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
      }

      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 0;
        gap: 12px;
        color: var(--text-secondary);
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid var(--border-color);
        border-top: 3px solid var(--accent-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .preview-box {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .preview-title {
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 6px;
        color: var(--text-primary);
      }
      .preview-meta {
        font-size: 12px;
        color: var(--text-secondary);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }
      .preview-stats {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-secondary);
        border-top: 1px dashed var(--border-color);
        padding-top: 8px;
      }

      .status-box {
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 16px;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
      }
      .status-success {
        background-color: rgba(21, 128, 61, 0.1);
        border: 1px solid rgba(21, 128, 61, 0.2);
        color: var(--accent-secondary);
      }
      .status-error {
        background-color: rgba(190, 18, 60, 0.1);
        border: 1px solid rgba(190, 18, 60, 0.2);
        color: var(--accent-tertiary);
      }

      .hidden {
        display: none !important;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Title header -->
    <h3 id="panel-header">
      <svg width="18" height="18" viewBox="0 0 512 512" fill="#D97706">
        <path
          d="M120 112v112c0 26.5 21.5 48 48 48h16v128c0 17.7 14.3 32 32 32s32-14.3 32-32V272h16c26.5 0 48-21.5 48-48V112c0-8.8-7.2-16-16-16s-16 7.2-16 16v80c0 8.8-7.2 16-16 16s-16-7.2-16-16V112c0-8.8-7.2-16-16-16s-16 7.2-16 16v80c0 8.8-7.2 16-16 16s-16-7.2-16-16V112c0-8.8-7.2-16-16-16s-16 7.2-16 16zm272 0c-26.5 0-48 21.5-48 48v80h16v184c0 17.7 14.3 32 32 32s32-14.3 32-32V160c0-26.5-21.5-48-48-48z"
        />
      </svg>
      Recipe Clipper
    </h3>

    <!-- Status banner -->
    <div id="status-banner" class="status-box hidden"></div>

    <!-- Caching / Scraping loading screen -->
    <div id="panel-loading" class="loader">
      <div class="spinner"></div>
      <span>Extracting recipe metadata...</span>
    </div>

    <!-- Connection Configuration Screen (If no PAT token saved) -->
    <div id="panel-config" class="hidden">
      <h4 style="margin-bottom: 8px">Connect GitHub Sync</h4>
      <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; margin-top: 0">
        Enter your repository settings to enable direct commits from the browser clipper.
      </p>

      <div class="input-group">
        <label>Username / Owner</label>
        <input type="text" id="cfg-owner" placeholder="e.g. fmaur" />
      </div>
      <div class="input-group">
        <label>Repository Name</label>
        <input type="text" id="cfg-repo" placeholder="e.g. family-recipes" />
      </div>
      <div class="input-group">
        <label>Branch Name</label>
        <input type="text" id="cfg-branch" placeholder="main" value="main" />
      </div>
      <div class="input-group">
        <label>Access Token (PAT)</label>
        <input type="password" id="cfg-token" placeholder="github_pat_xxx" />
      </div>

      <button class="btn btn-primary" id="btn-save-cfg" style="margin-top: 6px">
        Connect & Sync
      </button>
    </div>

    <!-- Clipping preview & submit screen -->
    <div id="panel-clipper" class="hidden">
      <!-- Preview Summary -->
      <div class="preview-box">
        <div class="preview-title" id="prev-title-header">Recipe Title</div>
        <div class="preview-meta" id="prev-meta-domain">Domain</div>
        <div class="preview-stats">
          <span id="stat-ingredients">0 ingredients</span>
          <span id="stat-steps">0 steps</span>
        </div>
      </div>

      <!-- Editable details -->
      <div class="input-group">
        <label>Custom Recipe Title</label>
        <input type="text" id="clip-title" placeholder="Grandma's Waffles" />
      </div>

      <div class="input-group">
        <label>Short Description</label>
        <textarea
          id="clip-desc"
          style="height: 54px; resize: none"
          placeholder="Scraped from web..."
        ></textarea>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 18px">
        <button
          class="btn btn-secondary"
          id="btn-change-sync"
          style="flex: 0.4"
          title="Configure GitHub Settings"
        >
          <svg width="14" height="14" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M495.9 166.6c3.2 8.7 .5 18.4-6.4 24.6l-43.3 39.4c1.1 8.3 1.7 16.8 1.7 25.4s-.6 17.1-1.7 25.4l43.3 39.4c6.9 6.2 9.6 15.9 6.4 24.6l-43.3 75c-3.4 5.9-10 9.7-16.8 9.7H17.8c-6.8 0-13.4-3.8-16.8-9.7l-43.3-75c-3.2-8.7-.5-18.4 6.4-24.6l43.3-39.4c-1.1-8.3-1.7-16.8-1.7-25.4s.6-17.1 1.7-25.4L-15.4 191.2c-6.9-6.2-9.6-15.9-6.4-24.6l43.3-75C-35.1 85.7-28.5 82-21.7 82h476.4c6.8 0 13.4 3.8 16.8 9.7l43.3 75z"
            />
          </svg>
        </button>
        <button class="btn btn-primary" id="btn-clip-recipe" style="flex: 1.6">
          <svg width="14" height="14" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 144-208 0c-35.3 0-64 28.7-64 64l0 144-48 0c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0 0-128 128 128z"
            />
          </svg>
          Save to Family Repo
        </button>
      </div>
    </div>

    <!-- Embedded execution controller -->
    <script src="popup.js"></script>
  </body>
</html>
